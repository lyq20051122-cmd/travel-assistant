<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>城市统计 - 旅游计划生成助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            ✈ 旅游计划生成助手
        </div>
        <a href="/" class="nav-link">智能对话</a>
        <a href="/cities" class="nav-link">城市介绍</a>
        <a href="/checklist" class="nav-link">旅游物品清单</a>
        <div class="stats-section">
            <a href="/city-stats" class="nav-link active stats-link">📊 城市统计</a>
        </div>
        <a href="/dashboard" class="nav-link dashboard-link">📈 数据看板</a>
        <a href="/weather-trend" class="nav-link weather-trend-link">🌡️ 天气趋势</a>
        <a href="/weekly-briefing" class="nav-link briefing-link">📋 每周天气简报</a>
        <a href="/travel-review-cards" class="nav-link">🃏 旅行回顾卡片</a>
    </div>

    <div class="main-container">
        <div class="top-bar">
            <div class="title-section">
                <h2>📊 城市统计</h2>
                <span>City Statistics</span>
            </div>
            <div class="top-right">
                <button class="clear-btn" onclick="clearAllStats()">清空所有记录</button>
            </div>
        </div>

        <div class="stats-container">
            <!-- 统计概览卡片 -->
            <div class="stats-summary">
                <div class="summary-card">
                    <div class="summary-icon">👀</div>
                    <div class="summary-content">
                        <div class="summary-value" id="total-interest">-</div>
                        <div class="summary-label">总兴趣次数</div>
                    </div>
                </div>
                <div class="summary-card">
                    <div class="summary-icon">✈️</div>
                    <div class="summary-content">
                        <div class="summary-value" id="total-visited">-</div>
                        <div class="summary-label">总访问次数</div>
                    </div>
                </div>
                <div class="summary-card">
                    <div class="summary-icon">🌍</div>
                    <div class="summary-content">
                        <div class="summary-value" id="unique-cities">-</div>
                        <div class="summary-label">关注城市数</div>
                    </div>
                </div>
            </div>

            <!-- 兴趣统计图表 -->
            <div class="stats-card">
                <h3>👀 城市兴趣排行榜</h3>
                <div class="chart-container">
                    <canvas id="interestChart" class="chart-canvas"></canvas>
                </div>
            </div>

            <!-- 访问统计图表 -->
            <div class="stats-card">
                <h3>✈️ 城市访问次数</h3>
                <div class="chart-container">
                    <canvas id="visitedChart" class="chart-canvas"></canvas>
                </div>
            </div>

            <!-- 城市列表 -->
            <div class="stats-card">
                <h3>🏙️ 城市记录管理</h3>
                <div id="city-list">
                    <p class="no-data">暂无数据</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 城市名称映射
        const CITY_NAMES = {
            'beijing': '北京', 'shanghai': '上海', 'guangzhou': '广州', 'shenzhen': '深圳',
            'hangzhou': '杭州', 'chengdu': '成都', 'chongqing': '重庆', 'xian': '西安',
            'nanjing': '南京', 'wuhan': '武汉', 'suzhou': '苏州', 'qingdao': '青岛',
            'xiamen': '厦门', 'fuzhou': '福州', 'kunming': '昆明', 'lijiang': '丽江'
        };

        let interestChart = null;
        let visitedChart = null;

        // 获取统计数据（从localStorage）
        function getStats() {
            try {
                const stored = localStorage.getItem('city_stats');
                return stored ? JSON.parse(stored) : {};
            } catch {
                return {};
            }
        }

        // 保存统计数据（到localStorage）
        function saveStats(stats) {
            localStorage.setItem('city_stats', JSON.stringify(stats));
        }

        // 加载统计数据
        function loadStats() {
            const stats = getStats();
            const result = [];
            let totalInterest = 0;
            let totalVisited = 0;

            for (const cityId of Object.keys(CITY_NAMES)) {
                const cityData = stats[cityId] || { interest: 0, visited: 0 };
                result.push({
                    city_id: cityId,
                    city_name: CITY_NAMES[cityId],
                    interest_count: cityData.interest || 0,
                    visited_count: cityData.visited || 0
                });
                totalInterest += cityData.interest || 0;
                totalVisited += cityData.visited || 0;
            }

            // 按总次数排序
            result.sort((a, b) => (b.interest_count + b.visited_count) - (a.interest_count + a.visited_count));

            return {
                stats: result,
                summary: {
                    total_interest: totalInterest,
                    total_visited: totalVisited,
                    unique_cities: result.filter(s => s.interest_count > 0 || s.visited_count > 0).length
                }
            };
        }

        // 更新概览
        function updateSummary(summary) {
            document.getElementById('total-interest').textContent = summary.total_interest;
            document.getElementById('total-visited').textContent = summary.total_visited;
            document.getElementById('unique-cities').textContent = summary.unique_cities;
        }

        // 更新图表
        function updateCharts(stats) {
            const cities = stats.map(item => item.city_name);
            const interestCounts = stats.map(item => item.interest_count);
            const visitedCounts = stats.map(item => item.visited_count);

            // 兴趣图表
            if (interestChart) interestChart.destroy();
            interestChart = new Chart(document.getElementById('interestChart'), {
                type: 'bar',
                data: {
                    labels: cities,
                    datasets: [{
                        label: '兴趣次数',
                        data: interestCounts,
                        backgroundColor: 'rgba(99, 102, 241, 0.7)',
                        borderColor: '#6366f1',
                        borderWidth: 1,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            ticks: { stepSize: 1 }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });

            // 访问图表
            if (visitedChart) visitedChart.destroy();
            visitedChart = new Chart(document.getElementById('visitedChart'), {
                type: 'bar',
                data: {
                    labels: cities,
                    datasets: [{
                        label: '访问次数',
                        data: visitedCounts,
                        backgroundColor: 'rgba(34, 197, 94, 0.7)',
                        borderColor: '#22c55e',
                        borderWidth: 1,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            ticks: { stepSize: 1 }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // 更新城市列表
        function updateCityList(stats) {
            if (stats.length === 0) {
                document.getElementById('city-list').innerHTML = '<p class="no-data">暂无数据</p>';
                return;
            }

            let html = '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">';
            stats.forEach(city => {
                html += `
                    <div style="background: #f9fafb; border-radius: 12px; padding: 15px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <span style="font-weight: bold; font-size: 16px;">${city.city_name}</span>
                            <div style="display: flex; gap: 8px;">
                                <button style="padding: 4px 8px; background: #6366f1; color: white; border: none; border-radius: 4px; font-size: 12px; cursor: pointer;" onclick="updateInterest('${city.city_id}')">+👀</button>
                                <button style="padding: 4px 8px; background: #22c55e; color: white; border: none; border-radius: 4px; font-size: 12px; cursor: pointer;" onclick="updateVisited('${city.city_id}')">+✈️</button>
                            </div>
                        </div>
                        <div style="display: flex; gap: 20px; font-size: 14px;">
                            <span>👀 兴趣: <strong>${city.interest_count}</strong></span>
                            <span>✈️ 访问: <strong>${city.visited_count}</strong></span>
                        </div>
                        <button style="margin-top: 10px; padding: 4px 12px; background: #ef4444; color: white; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; opacity: 0.7;" onclick="clearCityStats('${city.city_id}')">清空记录</button>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('city-list').innerHTML = html;
        }

        // 更新兴趣次数
        function updateInterest(cityId) {
            const stats = getStats();
            if (!stats[cityId]) stats[cityId] = { interest: 0, visited: 0 };
            stats[cityId].interest = (stats[cityId].interest || 0) + 1;
            saveStats(stats);
            refreshStats();
        }

        // 更新访问次数
        function updateVisited(cityId) {
            const stats = getStats();
            if (!stats[cityId]) stats[cityId] = { interest: 0, visited: 0 };
            stats[cityId].visited = (stats[cityId].visited || 0) + 1;
            saveStats(stats);
            refreshStats();
        }

        // 清空单个城市记录
        function clearCityStats(cityId) {
            if (confirm('确定要清空该城市的记录吗？')) {
                const stats = getStats();
                if (stats[cityId]) {
                    stats[cityId] = { interest: 0, visited: 0 };
                    saveStats(stats);
                }
                refreshStats();
            }
        }

        // 清空所有记录
        function clearAllStats() {
            if (confirm('确定要清空所有城市的统计记录吗？')) {
                localStorage.removeItem('city_stats');
                refreshStats();
            }
        }

        // 刷新统计显示
        function refreshStats() {
            const data = loadStats();
            updateSummary(data.summary);
            updateCharts(data.stats);
            updateCityList(data.stats);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', refreshStats);
    </script>
</body>
</html>
