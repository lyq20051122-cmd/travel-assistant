<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>旅游计划生成助手</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
        .container{max-width:800px;margin:0 auto;background:white;border-radius:15px;overflow:hidden}
        .header{background:#4a6cf7;color:white;padding:20px;text-align:center}
        .chat{height:500px;overflow-y:auto;padding:20px;background:#f8f9fa}
        .msg{margin-bottom:15px;max-width:70%;padding:12px 15px;border-radius:18px}
        .user{background:#4a6cf7;color:white;margin-left:auto}
        .bot{background:white;color:#333;border:1px solid #eee}
        .input-area{display:flex;padding:15px}
        input{flex:1;padding:12px 15px;border:1px solid #ddd;border-radius:25px;outline:none}
        button{margin-left:10px;padding:12px 20px;background:#4a6cf7;color:white;border:none;border-radius:25px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🏖️ 旅游计划生成助手</h1></div>
        <div class="chat" id="chat"></div>
        <div class="input-area">
            <input id="input" placeholder="说：我想去北京玩3天">
            <button onclick="send()">发送</button>
        </div>
    </div>

    <script>
        const userId = "user_"+Date.now();
        function addMsg(text, isUser){
            const div = document.createElement("div");
            div.className = "msg "+(isUser?"user":"bot");
            div.textContent = text;
            document.getElementById("chat").appendChild(div);
            document.getElementById("chat").scrollTop = 1e9;
        }

        function send(){
            const text = document.getElementById("input").value.trim();
            if(!text) return;
            addMsg(text, true);
            document.getElementById("input").value = "";

            fetch("/chat", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({user_id:userId, message:text})
            }).then(r=>r.json()).then(data=>{
                addMsg(data.reply, false);
            });
        }

        addMsg("你好！我是旅游助手，帮你规划行程~", false);
        document.getElementById("input").addEventListener("keypress",e=>{
            if(e.key==="Enter") send();
        });
    </script>
</body>
</html>
